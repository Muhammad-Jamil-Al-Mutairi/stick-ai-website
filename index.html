<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stick.AI | Live Telemetry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a; /* Deep slate tech background */
            color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            padding: 2.5rem 0;
            text-align: center;
            border-bottom: 1px solid #334155;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        header h1 {
            margin: 0;
            font-size: 3rem;
            background: -webkit-linear-gradient(#38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }
        header p { color: #94a3b8; font-size: 1.1rem; font-weight: 300; margin-top: 10px; }
        
        .container {
            width: 90%;
            max-width: 1200px;
            margin: auto;
            padding: 3rem 0;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 2rem;
        }
        .card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #334155;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .card h2 { margin-top: 0; color: #f1f5f9; font-weight: 500; font-size: 1.5rem; border-bottom: 2px solid #334155; padding-bottom: 10px; }
        .data-readout {
            font-size: 3rem;
            font-weight: 700;
            text-align: center;
            color: #ef4444; /* Heart rate red */
            margin: 1rem 0;
            text-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }
        canvas {
            background: #0f172a;
            border-radius: 10px;
            padding: 10px;
            border: 1px solid #334155;
        }
    </style>
</head>
<body>
    <header>
        <h1>Stick.AI</h1>
        <p>Real-Time Predictive Mobility Telemetry</p>
    </header>

    <div class="container">
        <div class="grid">
            <!-- Vitals Dashboard -->
            <div class="card">
                <h2>Pulse Oximetry</h2>
                <div class="data-readout" id="big-bpm">-- BPM</div>
                <canvas id="heartRateChart" height="200"></canvas>
            </div>

            <!-- IMU Dashboard -->
            <div class="card">
                <h2>AI Fall Analytics (IMU)</h2>
                <canvas id="motionChart" height="270"></canvas>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA3iSD2P6rrysE93uOD1i_o3QcGfGS_sjU",
            authDomain: "stick-ai-system.firebaseapp.com",
            databaseURL: "https://stick-ai-system-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "stick-ai-system",
            storageBucket: "stick-ai-system.firebasestorage.app",
            messagingSenderId: "174536136776",
            appId: "1:174536136776:web:517dd123c2e3d443cae07d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const sensorRef = ref(db, 'sensors');

        // Global Chart Defaults for "Dark Mode"
        Chart.defaults.color = '#94a3b8';
        Chart.defaults.borderColor = '#334155';

        const maxDataPoints = 15;
        let lastKnownBPM = null; // Memory to prevent the line from dropping to zero

        // 1. Setup Heart Rate Chart
        const hrChart = new Chart(document.getElementById('heartRateChart').getContext('2d'), {
            type: 'line',
            data: { labels: [], datasets: [{ label: 'Heart Rate', borderColor: '#ef4444', backgroundColor: 'rgba(239, 68, 68, 0.1)', data: [], tension: 0.4, fill: true, pointRadius: 4, pointBackgroundColor: '#ef4444' }] },
            options: { responsive: true, scales: { y: { min: 40, max: 150 } }, animation: { duration: 500 } }
        });

        // 2. Setup Motion Chart
        const motionChart = new Chart(document.getElementById('motionChart').getContext('2d'), {
            type: 'line',
            data: {
                labels: [],
                datasets: [
                    { label: 'X-Axis', borderColor: '#38bdf8', data: [], tension: 0.3, pointRadius: 0 },
                    { label: 'Y-Axis', borderColor: '#4ade80', data: [], tension: 0.3, pointRadius: 0 },
                    { label: 'Z-Axis', borderColor: '#a78bfa', data: [], tension: 0.3, pointRadius: 0 }
                ]
            },
            options: { responsive: true, scales: { y: { suggestedMin: -20, suggestedMax: 20 } }, animation: { duration: 500 } }
        });

        // --- Fetch Real-Time Data ---
        onValue(sensorRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                const now = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});

                // Logic: Only update the chart if we have a real human BPM
                if (data.heartRate !== undefined && data.heartRate > 40) {
                    lastKnownBPM = data.heartRate;
                    document.getElementById('big-bpm').innerText = `${lastKnownBPM} BPM`;
                }
                
                hrChart.data.labels.push(now);
                hrChart.data.datasets[0].data.push(lastKnownBPM); // Prevents the chart from crashing to 40
                
                if (hrChart.data.labels.length > maxDataPoints) {
                    hrChart.data.labels.shift();
                    hrChart.data.datasets[0].data.shift();
                }
                hrChart.update();

                // Motion Logic
                motionChart.data.labels.push(now);
                motionChart.data.datasets[0].data.push(data.accelX !== undefined ? data.accelX : 0);
                motionChart.data.datasets[1].data.push(data.accelY !== undefined ? data.accelY : 0);
                motionChart.data.datasets[2].data.push(data.accelZ !== undefined ? data.accelZ : 0);
                
                if (motionChart.data.labels.length > maxDataPoints) {
                    motionChart.data.labels.shift();
                    motionChart.data.datasets.forEach(dataset => dataset.data.shift());
                }
                motionChart.update();
            }
        });
    </script>
</body>
</html>
